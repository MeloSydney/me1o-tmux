# Set Ctrl-b key bindings
unbind C-b
set -g prefix `
bind '`' send-prefix

# Count sessions start at 1
set -g base-index 1
setw -g pane-base-index 1

# Use vim bindings
setw -g mode-keys vi
# start selecting text typing 'v' key (once you are in copy mode)
bind-key -T copy-mode-vi 'v' send -X begin-selection
# # copy selected text to the system clipboard
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "xclip -selection clipboard -in"

# Split window: intuitive | / - and inherit cwd
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Repeatable pane resize (-r = within repeat-time)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Rectangle selection in copy-mode
bind -T copy-mode-vi V send -X rectangle-toggle

# Status bar settings
# alignment
set-option -g status-justify centre

# left-bottom corner
set-option -g status-left '#[bg=black, fg=green][#[fg=cyan]#S#[fg=green]]'
set-option -g status-left-length 20

# window list
set-window-option -g window-status-format '#[dim]#I:#[default]#W#[fg=grey, dim]'
set-window-option -g window-status-current-format '#[fg=cyan, bold]#I#[fg=blue]:#[fg=cyan]#W#[fg=dim]'

# right-bottom status
set -g status-right '#[fg=green][#[fg=cyan]%Y-%m-%d#[fg=green]]'

# default statusbar colors
set -g status-fg white
set -g status-bg black

# default window title colors
set-window-option -g window-status-style fg=white,bg=default,dim

# active window title colors
set-window-option -ag window-status-current-style fg=red
set-window-option -ag window-status-current-style bg=default
set-window-option -ag window-status-current-style bold

# window-name
set-option -g allow-rename off

# Melo C-r cmd history buffer size
set-option -g history-limit 100000

# Melo 256color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:RGB"

# Optional: mouse + aggressive-resize
# Note: with mouse on, hold Shift to use the terminal's native selection
set -g mouse on
setw -g aggressive-resize on

# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded"

# Shorten ESC delay (vi-mode friendly)
set -sg escape-time 10

# Let vim's autoread / FocusGained fire under tmux
set -g focus-events on
